<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR 코드 — 여길 바라x3 밤</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      color: #1c1c1e;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 4px;
      text-align: center;
    }

    .subtitle {
      font-size: 14px;
      color: #6e6e73;
      margin-bottom: 32px;
      text-align: center;
    }

    .qr-card {
      background: #fff;
      border-radius: 24px;
      padding: 32px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    #qrcode canvas,
    #qrcode img {
      border-radius: 8px;
      display: block;
    }

    .qr-label {
      font-size: 15px;
      font-weight: 600;
      color: #1c1c1e;
      text-align: center;
    }

    .qr-url {
      font-size: 11px;
      color: #8e8e93;
      word-break: break-all;
      text-align: center;
      max-width: 240px;
    }

    .account-info {
      text-align: center;
      border-top: 1px solid #f2f2f7;
      padding-top: 16px;
      width: 100%;
    }

    .account-bank {
      font-size: 13px;
      color: #6e6e73;
      margin-bottom: 4px;
    }

    .account-number {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .account-holder {
      font-size: 14px;
      color: #6e6e73;
    }
  </style>
</head>
<body>

  <h1>여길 바라x3 밤</h1>
  <p class="subtitle">서울 코믹스 2026</p>

  <div class="qr-card">
    <div class="qr-label">QR 코드를 스캔해 결제 페이지로</div>
    <div id="qrcode"></div>
    <div class="account-info">
      <div class="account-bank">카카오뱅크</div>
      <div class="account-number">3333-36-8270469</div>
      <div class="account-holder">박*아</div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script>
    new QRCode(document.getElementById('qrcode'), {
      text: 'https://agnecom.github.io/sengah-sc/index.html',
      width: 220,
      height: 220,
      colorDark: '#1c1c1e',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M
    });
  </script>
</body>
</html>
