<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>계좌 이체 안내</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px 48px;
      color: #1c1c1e;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 4px;
      text-align: center;
    }

    .subtitle {
      font-size: 14px;
      color: #6e6e73;
      margin-bottom: 28px;
      text-align: center;
    }

    /* ── 카드 공통 ── */
    .card {
      background: #fff;
      border-radius: 18px;
      padding: 24px 20px;
      width: 100%;
      max-width: 400px;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .card-title {
      font-size: 12px;
      font-weight: 600;
      color: #8e8e93;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 14px;
    }

    /* ── 계좌 카드 ── */
    .account-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .account-info .bank {
      font-size: 13px;
      color: #6e6e73;
      margin-bottom: 4px;
    }

    .account-info .number {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .account-info .holder {
      font-size: 13px;
      color: #6e6e73;
      margin-top: 4px;
    }

    .copy-btn {
      flex-shrink: 0;
      background: #007aff;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 10px 18px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    .copy-btn:active {
      transform: scale(0.96);
    }

    .copy-btn.copied {
      background: #34c759;
    }

    .copy-hint {
      font-size: 12px;
      color: #8e8e93;
      margin-top: 12px;
      text-align: center;
    }

    /* ── 은행 앱 버튼 ── */
    .bank-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .bank-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      background: #f2f2f7;
      border: none;
      border-radius: 14px;
      padding: 14px 8px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      text-decoration: none;
      color: #1c1c1e;
    }

    .bank-btn:active {
      background: #e5e5ea;
      transform: scale(0.96);
    }

    .bank-btn .icon {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: -0.5px;
      line-height: 1;
      overflow: hidden;
    }

    .icon-img {
      background: #fff;
      border: 1px solid #e5e5ea;
    }

    .icon-img img {
      width: 80%;
      height: 80%;
      object-fit: contain;
    }

    .bank-btn .name {
      font-size: 12px;
      font-weight: 500;
      text-align: center;
    }

    /* 은행별 브랜드 컬러 */
    .icon-toss      { background: #0064FF; color: #fff; }
    .icon-kakao     { background: #FEE500; color: #3C1E1E; }
    .icon-naver     { background: #03C75A; color: #fff; }
    .icon-shinhan   { background: #0046FF; color: #fff; }
    .icon-kb        { background: #FFB800; color: #4A3000; }
    .icon-nh        { background: #009B4D; color: #fff; }
    .icon-woori     { background: #006EB9; color: #fff; }
    .icon-hana      { background: #009490; color: #fff; }
    .icon-ibk       { background: #006BFF; color: #fff; }

    /* ── 상품 가격표 ── */
    .price-list {
      list-style: none;
    }

    .price-list li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #f2f2f7;
      font-size: 15px;
      cursor: pointer;
      border-radius: 8px;
      transition: background 0.1s;
    }

    .price-list li:last-child {
      border-bottom: none;
    }

    .price-list li:active {
      background: #f2f2f7;
    }

    .price-list li.selected {
      background: #e8f0fe;
    }

    .price-list .item-name {
      color: #1c1c1e;
    }

    .price-list .item-price {
      font-weight: 700;
      color: #007aff;
    }

    /* ── 선택 금액 표시 ── */
    .amount-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #f2f2f7;
      border-radius: 12px;
      padding: 10px 14px;
      margin-top: 12px;
      font-size: 14px;
    }

    .amount-bar .label {
      color: #6e6e73;
    }

    .amount-bar .value {
      font-weight: 700;
      font-size: 16px;
      color: #1c1c1e;
    }

    .amount-bar .reset-btn {
      background: none;
      border: none;
      color: #8e8e93;
      font-size: 13px;
      cursor: pointer;
      padding: 2px 6px;
    }

    /* ── 안내 문구 ── */
    .notice {
      font-size: 13px;
      color: #8e8e93;
      text-align: center;
      max-width: 400px;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <!-- ✏️ 판매자 이름/이벤트명을 수정하세요 -->
  <h1>여길 바라x3 밤</h1>
  <p class="subtitle">서울 코믹스 2026</p>

  <!-- ── 상품 가격표 ── -->
  <div class="card">
    <div class="card-title">상품 가격표 (탭하면 금액 선택)</div>
    <!-- ✏️ 상품 목록과 가격을 수정하세요 (data-price는 원 단위 숫자) -->
    <ul class="price-list" id="priceList">
      <li data-price="5000" onclick="selectAmount(this)">
        <span class="item-name">키링</span>
        <span class="item-price">5,000원</span>
      </li>
      <li data-price="2000" onclick="selectAmount(this)">
        <span class="item-name">포토카드 (1장)</span>
        <span class="item-price">2,000원</span>
      </li>
      <li data-price="5000" onclick="selectAmount(this)">
        <span class="item-name">포토카드 (3장 세트)</span>
        <span class="item-price">5,000원</span>
      </li>
      <li data-price="8000" onclick="selectAmount(this)">
        <span class="item-name">브로마이드</span>
        <span class="item-price">8,000원</span>
      </li>
    </ul>
    <div class="amount-bar" id="amountBar" style="display:none">
      <span class="label">이체 금액</span>
      <span class="value" id="amountDisplay"></span>
      <button class="reset-btn" onclick="resetAmount()">취소</button>
    </div>
  </div>

  <!-- ── 은행 앱 바로가기 ── -->
  <div class="card">
    <div class="card-title">은행 앱으로 바로 이체</div>
    <div class="bank-grid">
      <!-- 토스: 계좌번호 미리 입력된 송금 화면으로 이동 (bankCode 090 = 카카오뱅크) -->
      <button class="bank-btn" onclick="openApp('supertoss://send?bankCode=090&accountNo=3333368270469')">
        <span class="icon icon-toss">toss</span>
        <span class="name">토스</span>
      </button>
      <!-- 카카오페이: 송금 탭으로 이동 -->
      <button class="bank-btn" onclick="openApp('kakaopay://')">
        <span class="icon icon-kakao">Pay</span>
        <span class="name">카카오페이</span>
      </button>
      <!-- 네이버페이 -->
      <button class="bank-btn" onclick="openApp('naversearchapp://pay')">
        <span class="icon icon-naver">N Pay</span>
        <span class="name">네이버페이</span>
      </button>
      <button class="bank-btn" onclick="openApp('shinhanbank://')">
        <span class="icon icon-img"><img src="images/shinhan.png" alt="신한" /></span>
        <span class="name">신한은행</span>
      </button>
      <button class="bank-btn" onclick="openApp('kb-starbanking://')">
        <span class="icon icon-img"><img src="images/kb.png" alt="KB" /></span>
        <span class="name">국민은행</span>
      </button>
      <button class="bank-btn" onclick="openApp('nhallonebanking://')">
        <span class="icon icon-img"><img src="images/nh.png" alt="NH" /></span>
        <span class="name">농협은행</span>
      </button>
      <button class="bank-btn" onclick="openApp('wooribank://')">
        <span class="icon icon-img"><img src="images/woori.png" alt="우리" /></span>
        <span class="name">우리은행</span>
      </button>
      <button class="bank-btn" onclick="openApp('hanabank://')">
        <span class="icon icon-img"><img src="images/hana.png" alt="하나" /></span>
        <span class="name">하나은행</span>
      </button>
      <button class="bank-btn" onclick="openApp('ibkbank://')">
        <span class="icon icon-img"><img src="images/ibk.png" alt="IBK" /></span>
        <span class="name">기업은행</span>
      </button>
    </div>
    <p style="font-size:12px;color:#8e8e93;text-align:center;margin-top:14px;line-height:1.6;">
      앱 버튼을 누르면 계좌번호가 자동 복사됩니다<br>앱 열린 후 송금 화면에서 붙여넣기 하세요
    </p>
  </div>

  <!-- ── 계좌 정보 카드 ── -->
  <div class="card">
    <div class="card-title">계좌번호</div>
    <div class="account-row">
      <div class="account-info">
        <!-- ✏️ 은행명, 계좌번호, 예금주를 수정하세요 -->
        <div class="bank">카카오뱅크</div>
        <div class="number" id="accountNumber">3333-36-8270469</div>
        <div class="holder">홍길동</div>
      </div>
      <button class="copy-btn" id="copyBtn" onclick="copyAccount()">복사</button>
    </div>
    <p class="copy-hint">복사 후 은행 앱에서 붙여넣기 하세요</p>
  </div>

  <p class="notice">이체 완료 후 판매자에게 확인해주세요 😊<br>현장 교환은 영수증(이체 화면) 제시 부탁드립니다.</p>

  <script>
    function copyAccount() {
      const number = document.getElementById('accountNumber').textContent.trim();
      const btn = document.getElementById('copyBtn');

      navigator.clipboard.writeText(number).then(() => {
        btn.textContent = '복사됨!';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = '복사';
          btn.classList.remove('copied');
        }, 2000);
      }).catch(() => {
        // fallback for older browsers
        const el = document.createElement('textarea');
        el.value = number;
        el.style.position = 'fixed';
        el.style.opacity = '0';
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
        btn.textContent = '복사됨!';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = '복사';
          btn.classList.remove('copied');
        }, 2000);
      });
    }

    // QR 코드 생성 (현재 페이지 URL)
    (function() {
      const url = window.location.href;
      document.getElementById('qrUrl').textContent = url;
      new QRCode(document.getElementById('qrcode'), {
        text: url,
        width: 180,
        height: 180,
        colorDark: '#1c1c1e',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.M
      });
    })();

    let selectedAmount = 0;

    function selectAmount(el) {
      document.querySelectorAll('#priceList li').forEach(li => li.classList.remove('selected'));
      el.classList.add('selected');
      selectedAmount = parseInt(el.dataset.price, 10);
      document.getElementById('amountDisplay').textContent = selectedAmount.toLocaleString('ko-KR') + '원';
      document.getElementById('amountBar').style.display = 'flex';
    }

    function resetAmount() {
      selectedAmount = 0;
      document.querySelectorAll('#priceList li').forEach(li => li.classList.remove('selected'));
      document.getElementById('amountBar').style.display = 'none';
    }

    function openApp(deepLink) {
      // 토스: 선택된 금액 추가
      if (deepLink.startsWith('supertoss://') && selectedAmount > 0) {
        deepLink += '&amount=' + selectedAmount;
      }

      // ① 딥링크 즉시 실행 (iOS 사용자 제스처 컨텍스트 내 동기 실행)
      window.location.href = deepLink;

      // ② 계좌번호 복사 — 앱 열린 후 붙여넣기용
      const rawNumber = document.getElementById('accountNumber').textContent.replace(/-/g, '').trim();
      navigator.clipboard.writeText(rawNumber).catch(() => {
        const el = document.createElement('textarea');
        el.value = rawNumber;
        el.style.cssText = 'position:fixed;opacity:0';
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
      });
    }
  </script>
</body>
</html>
