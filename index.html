<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>계좌 이체 안내</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px 48px;
      color: #1c1c1e;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 4px;
      text-align: center;
    }

    .subtitle {
      font-size: 14px;
      color: #6e6e73;
      margin-bottom: 28px;
      text-align: center;
    }

    /* ── 카드 공통 ── */
    .card {
      background: #fff;
      border-radius: 18px;
      padding: 24px 20px;
      width: 100%;
      max-width: 400px;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .card-title {
      font-size: 12px;
      font-weight: 600;
      color: #8e8e93;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 14px;
    }

    /* ── 계좌 카드 ── */
    .account-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .account-info .bank {
      font-size: 13px;
      color: #6e6e73;
      margin-bottom: 4px;
    }

    .account-info .number {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .account-info .holder {
      font-size: 13px;
      color: #6e6e73;
      margin-top: 4px;
    }

    .copy-btn {
      flex-shrink: 0;
      background: #007aff;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 10px 18px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    .copy-btn:active {
      transform: scale(0.96);
    }

    .copy-btn.copied {
      background: #34c759;
    }

    .copy-hint {
      font-size: 12px;
      color: #8e8e93;
      margin-top: 12px;
      text-align: center;
    }

    /* ── 은행 앱 버튼 ── */
    .bank-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .bank-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      background: #f2f2f7;
      border: none;
      border-radius: 14px;
      padding: 14px 8px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      text-decoration: none;
      color: #1c1c1e;
    }

    .bank-btn:active {
      background: #e5e5ea;
      transform: scale(0.96);
    }

    .bank-btn .icon {
      font-size: 28px;
      line-height: 1;
    }

    .bank-btn .name {
      font-size: 12px;
      font-weight: 500;
      text-align: center;
    }

    /* ── 상품 가격표 ── */
    .price-list {
      list-style: none;
    }

    .price-list li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #f2f2f7;
      font-size: 15px;
    }

    .price-list li:last-child {
      border-bottom: none;
    }

    .price-list .item-name {
      color: #1c1c1e;
    }

    .price-list .item-price {
      font-weight: 700;
      color: #007aff;
    }

    /* ── QR 코드 ── */
    .qr-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    #qrcode canvas,
    #qrcode img {
      border-radius: 8px;
    }

    .qr-url {
      font-size: 11px;
      color: #8e8e93;
      word-break: break-all;
      text-align: center;
    }

    /* ── 안내 문구 ── */
    .notice {
      font-size: 13px;
      color: #8e8e93;
      text-align: center;
      max-width: 400px;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <!-- ✏️ 판매자 이름/이벤트명을 수정하세요 -->
  <h1>센가 굿즈샵</h1>
  <p class="subtitle">서울 코믹스 2025</p>

  <!-- ── 계좌 정보 카드 ── -->
  <div class="card">
    <div class="card-title">계좌번호</div>
    <div class="account-row">
      <div class="account-info">
        <!-- ✏️ 은행명, 계좌번호, 예금주를 수정하세요 -->
        <div class="bank">카카오뱅크</div>
        <div class="number" id="accountNumber">3333-36-8270469</div>
        <div class="holder">홍길동</div>
      </div>
      <button class="copy-btn" id="copyBtn" onclick="copyAccount()">복사</button>
    </div>
    <p class="copy-hint">복사 후 은행 앱에서 붙여넣기 하세요</p>
  </div>

  <!-- ── 은행 앱 바로가기 ── -->
  <div class="card">
    <div class="card-title">은행 앱으로 바로 이체</div>
    <div class="bank-grid">
      <!-- 토스: 계좌번호 미리 입력된 송금 화면으로 이동 (bankCode 090 = 카카오뱅크) -->
      <button class="bank-btn" onclick="openApp('supertoss://send?bankCode=090&accountNo=3333368270469', 'https://play.google.com/store/apps/details?id=viva.republica.toss', 'https://apps.apple.com/kr/app/id839333328')">
        <span class="icon">💙</span>
        <span class="name">토스</span>
      </button>
      <!-- 카카오페이: 송금 탭으로 이동 -->
      <button class="bank-btn" onclick="openApp('kakaopay://transfer', 'https://play.google.com/store/apps/details?id=com.kakao.talk', 'https://apps.apple.com/kr/app/id362057947')">
        <span class="icon">💛</span>
        <span class="name">카카오페이</span>
      </button>
      <!-- 네이버페이 -->
      <button class="bank-btn" onclick="openApp('naversearchapp://pay', 'https://play.google.com/store/apps/details?id=com.nhn.android.search', 'https://apps.apple.com/kr/app/id393499958')">
        <span class="icon">💚</span>
        <span class="name">네이버페이</span>
      </button>
      <button class="bank-btn" onclick="openApp('shinhan-sr-ansimclick://', 'https://play.google.com/store/apps/details?id=com.shinhan.sbanking', 'https://apps.apple.com/kr/app/id357484510')">
        <span class="icon">🏦</span>
        <span class="name">신한은행</span>
      </button>
      <button class="bank-btn" onclick="openApp('kb-starbanking://', 'https://play.google.com/store/apps/details?id=com.kbstar.kbbank', 'https://apps.apple.com/kr/app/id373742138')">
        <span class="icon">🏦</span>
        <span class="name">국민은행</span>
      </button>
      <button class="bank-btn" onclick="openApp('nhallonebanking://', 'https://play.google.com/store/apps/details?id=nh.smart.banking', 'https://apps.apple.com/kr/app/id1177889076')">
        <span class="icon">🏦</span>
        <span class="name">농협은행</span>
      </button>
      <button class="bank-btn" onclick="openApp('wooribank://', 'https://play.google.com/store/apps/details?id=com.wooribank.smart.won', 'https://apps.apple.com/kr/app/id427105187')">
        <span class="icon">🏦</span>
        <span class="name">우리은행</span>
      </button>
      <button class="bank-btn" onclick="openApp('hanabank://', 'https://play.google.com/store/apps/details?id=com.kebhana.hanapay', 'https://apps.apple.com/kr/app/id1278913749')">
        <span class="icon">🏦</span>
        <span class="name">하나은행</span>
      </button>
      <button class="bank-btn" onclick="openApp('ibkbank://', 'https://play.google.com/store/apps/details?id=com.ibk.neobanking', 'https://apps.apple.com/kr/app/id506660773')">
        <span class="icon">🏦</span>
        <span class="name">기업은행</span>
      </button>
    </div>
  </div>

  <!-- ── 상품 가격표 ── -->
  <div class="card">
    <div class="card-title">상품 가격표</div>
    <!-- ✏️ 상품 목록과 가격을 수정하세요 -->
    <ul class="price-list">
      <li>
        <span class="item-name">키링</span>
        <span class="item-price">5,000원</span>
      </li>
      <li>
        <span class="item-name">포토카드 (1장)</span>
        <span class="item-price">2,000원</span>
      </li>
      <li>
        <span class="item-name">포토카드 (3장 세트)</span>
        <span class="item-price">5,000원</span>
      </li>
      <li>
        <span class="item-name">브로마이드</span>
        <span class="item-price">8,000원</span>
      </li>
    </ul>
  </div>

  <!-- ── QR 코드 카드 ── -->
  <div class="card">
    <div class="card-title">QR 코드로 이 페이지 공유</div>
    <div class="qr-wrap">
      <div id="qrcode"></div>
      <p class="qr-url" id="qrUrl"></p>
    </div>
  </div>

  <p class="notice">이체 완료 후 판매자에게 확인해주세요 😊<br>현장 교환은 영수증(이체 화면) 제시 부탁드립니다.</p>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script>
    function copyAccount() {
      const number = document.getElementById('accountNumber').textContent.trim();
      const btn = document.getElementById('copyBtn');

      navigator.clipboard.writeText(number).then(() => {
        btn.textContent = '복사됨!';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = '복사';
          btn.classList.remove('copied');
        }, 2000);
      }).catch(() => {
        // fallback for older browsers
        const el = document.createElement('textarea');
        el.value = number;
        el.style.position = 'fixed';
        el.style.opacity = '0';
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
        btn.textContent = '복사됨!';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = '복사';
          btn.classList.remove('copied');
        }, 2000);
      });
    }

    // QR 코드 생성 (현재 페이지 URL)
    (function() {
      const url = window.location.href;
      document.getElementById('qrUrl').textContent = url;
      new QRCode(document.getElementById('qrcode'), {
        text: url,
        width: 180,
        height: 180,
        colorDark: '#1c1c1e',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.M
      });
    })();

    function openApp(deepLink, androidUrl, iosUrl) {
      const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
      const storeUrl = isIOS ? iosUrl : androidUrl;

      // 앱이 열리면 blur 이벤트 발생 → fallback 취소
      let appOpened = false;
      const onBlur = () => { appOpened = true; };
      window.addEventListener('blur', onBlur);

      setTimeout(() => {
        window.removeEventListener('blur', onBlur);
        if (!appOpened) {
          // 앱이 없으면 스토어로 이동
          window.location.href = storeUrl;
        }
      }, 1500);

      window.location.href = deepLink;
    }
  </script>
</body>
</html>
