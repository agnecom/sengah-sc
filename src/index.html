<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>계좌 이체 안내</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px 48px;
      color: #1c1c1e;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 4px;
      text-align: center;
    }

    .subtitle {
      font-size: 14px;
      color: #6e6e73;
      margin-bottom: 28px;
      text-align: center;
    }

    /* ── 카드 공통 ── */
    .card {
      background: #fff;
      border-radius: 18px;
      padding: 24px 20px;
      width: 100%;
      max-width: 400px;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .card-title {
      font-size: 12px;
      font-weight: 600;
      color: #8e8e93;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 14px;
    }

    /* ── 계좌 카드 ── */
    .account-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .account-info .bank {
      font-size: 13px;
      color: #6e6e73;
      margin-bottom: 4px;
    }

    .account-info .number {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .account-info .holder {
      font-size: 13px;
      color: #6e6e73;
      margin-top: 4px;
    }

    .copy-btn {
      flex-shrink: 0;
      background: #007aff;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 10px 18px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    .copy-btn:active {
      transform: scale(0.96);
    }

    .copy-btn.copied {
      background: #34c759;
    }

    .copy-hint {
      font-size: 12px;
      color: #8e8e93;
      margin-top: 12px;
      text-align: center;
    }

    /* ── 은행 앱 버튼 ── */
    .bank-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .bank-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      background: #f2f2f7;
      border: none;
      border-radius: 14px;
      padding: 14px 8px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      text-decoration: none;
      color: #1c1c1e;
    }

    .bank-btn:active {
      background: #e5e5ea;
      transform: scale(0.96);
    }

    .bank-btn .icon {
      font-size: 28px;
      line-height: 1;
    }

    .bank-btn .name {
      font-size: 12px;
      font-weight: 500;
      text-align: center;
    }

    /* ── 상품 가격표 ── */
    .price-list {
      list-style: none;
    }

    .price-list li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #f2f2f7;
      font-size: 15px;
    }

    .price-list li:last-child {
      border-bottom: none;
    }

    .price-list .item-name {
      color: #1c1c1e;
    }

    .price-list .item-price {
      font-weight: 700;
      color: #007aff;
    }

    /* ── 안내 문구 ── */
    .notice {
      font-size: 13px;
      color: #8e8e93;
      text-align: center;
      max-width: 400px;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <!-- ✏️ 판매자 이름/이벤트명을 수정하세요 -->
  <h1>센가 굿즈샵</h1>
  <p class="subtitle">서울 코믹스 2025</p>

  <!-- ── 계좌 정보 카드 ── -->
  <div class="card">
    <div class="card-title">계좌번호</div>
    <div class="account-row">
      <div class="account-info">
        <!-- ✏️ 은행명, 계좌번호, 예금주를 수정하세요 -->
        <div class="bank">카카오뱅크</div>
        <div class="number" id="accountNumber">3333-36-8270469</div>
        <div class="holder">홍길동</div>
      </div>
      <button class="copy-btn" id="copyBtn" onclick="copyAccount()">복사</button>
    </div>
    <p class="copy-hint">복사 후 은행 앱에서 붙여넣기 하세요</p>
  </div>

  <!-- ── 은행 앱 바로가기 ── -->
  <div class="card">
    <div class="card-title">은행 앱 바로가기</div>
    <div class="bank-grid">
      <a class="bank-btn" href="kakaopay://pay" onclick="return openApp(this, 'https://play.google.com/store/apps/details?id=com.kakao.talk')">
        <span class="icon">💛</span>
        <span class="name">카카오페이</span>
      </a>
      <a class="bank-btn" href="supertoss://" onclick="return openApp(this, 'https://play.google.com/store/apps/details?id=viva.republica.toss')">
        <span class="icon">💙</span>
        <span class="name">토스</span>
      </a>
      <a class="bank-btn" href="naversearchapp://pay" onclick="return openApp(this, 'https://play.google.com/store/apps/details?id=com.nhn.android.search')">
        <span class="icon">💚</span>
        <span class="name">네이버페이</span>
      </a>
      <a class="bank-btn" href="shinhan-sr-ansimclick://" onclick="return openApp(this, 'https://play.google.com/store/apps/details?id=com.shinhan.sbanking')">
        <span class="icon">🏦</span>
        <span class="name">신한은행</span>
      </a>
      <a class="bank-btn" href="kb-starbanking://" onclick="return openApp(this, 'https://play.google.com/store/apps/details?id=com.kbstar.kbbank')">
        <span class="icon">🏦</span>
        <span class="name">국민은행</span>
      </a>
      <a class="bank-btn" href="nhallonebanking://" onclick="return openApp(this, 'https://play.google.com/store/apps/details?id=nh.smart.banking')">
        <span class="icon">🏦</span>
        <span class="name">농협은행</span>
      </a>
      <a class="bank-btn" href="wooribank://" onclick="return openApp(this, 'https://play.google.com/store/apps/details?id=com.wooribank.smart.won')">
        <span class="icon">🏦</span>
        <span class="name">우리은행</span>
      </a>
      <a class="bank-btn" href="hanabank://" onclick="return openApp(this, 'https://play.google.com/store/apps/details?id=com.kebhana.hanapay')">
        <span class="icon">🏦</span>
        <span class="name">하나은행</span>
      </a>
      <a class="bank-btn" href="ibkbank://" onclick="return openApp(this, 'https://play.google.com/store/apps/details?id=com.ibk.neobanking')">
        <span class="icon">🏦</span>
        <span class="name">기업은행</span>
      </a>
    </div>
  </div>

  <!-- ── 상품 가격표 ── -->
  <div class="card">
    <div class="card-title">상품 가격표</div>
    <!-- ✏️ 상품 목록과 가격을 수정하세요 -->
    <ul class="price-list">
      <li>
        <span class="item-name">키링</span>
        <span class="item-price">5,000원</span>
      </li>
      <li>
        <span class="item-name">포토카드 (1장)</span>
        <span class="item-price">2,000원</span>
      </li>
      <li>
        <span class="item-name">포토카드 (3장 세트)</span>
        <span class="item-price">5,000원</span>
      </li>
      <li>
        <span class="item-name">브로마이드</span>
        <span class="item-price">8,000원</span>
      </li>
    </ul>
  </div>

  <p class="notice">이체 완료 후 판매자에게 확인해주세요 😊<br>현장 교환은 영수증(이체 화면) 제시 부탁드립니다.</p>

  <script>
    function copyAccount() {
      const number = document.getElementById('accountNumber').textContent.trim();
      const btn = document.getElementById('copyBtn');

      navigator.clipboard.writeText(number).then(() => {
        btn.textContent = '복사됨!';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = '복사';
          btn.classList.remove('copied');
        }, 2000);
      }).catch(() => {
        // fallback for older browsers
        const el = document.createElement('textarea');
        el.value = number;
        el.style.position = 'fixed';
        el.style.opacity = '0';
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
        btn.textContent = '복사됨!';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = '복사';
          btn.classList.remove('copied');
        }, 2000);
      });
    }

    function openApp(el, fallbackUrl) {
      const appUrl = el.href;
      const start = Date.now();

      // 딥링크 시도 후 앱이 없으면 스토어로 이동
      setTimeout(() => {
        if (Date.now() - start < 1800) {
          window.location.href = fallbackUrl;
        }
      }, 1500);

      window.location.href = appUrl;
      return false;
    }
  </script>
</body>
</html>
